version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: intranic_backend
    restart: always
    ports:
      - "4002:4002"
    env_file:
      - ./server/.env.docker
    networks:
      - intranic_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: intranic_frontend
    restart: always
    ports:
      - "5173:5173"
    networks:
      - intranic_network

networks:
  intranic_network: