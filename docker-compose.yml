version: "3.9"

services:
  intranic-backend:
    container_name: intranic-backend
    image: ghcr.io/francocsanchez/intranic-backend:latest
    ports:
      - "4003:4002"
    restart: unless-stopped
    environment:
      PORT: 4002
      NODE_ENV: production
      DATABASE_MONGO: ${DATABASE_MONGO}

      PORT_NIC: ${PORT_NIC}
      DBUSER_NIC: ${DBUSER_NIC}
      DBPASS_NIC: ${DBPASS_NIC}
      DBHOST_NIC: ${DBHOST_NIC}
      DBPORT_NIC: ${DBPORT_NIC}
      DATABASE_NIC: ${DATABASE_NIC}

      PORT_LIESS: ${PORT_LIESS}
      DBUSER_LIESS: ${DBUSER_LIESS}
      DBPASS_LIESS: ${DBPASS_LIESS}
      DBHOST_LIESS: ${DBHOST_LIESS}
      DBPORT_LIESS: ${DBPORT_LIESS}
      DATABASE_LIESS: ${DATABASE_LIESS}

      FRONTEND_URL_NIC: ${FRONTEND_URL_NIC}
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  intranic-frontend:
    container_name: intranic-frontend
    image: ghcr.io/francocsanchez/intranic-frontend:latest
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - intranic-backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s